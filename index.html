<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Interval Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f4f4f2;
      --text: #1a1a1a;
      --text-secondary: #777770;
      --border: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --text: #f0f0ee;
        --text-secondary: #8e8e93;
        --border: rgba(255,255,255,0.1);
        --border-secondary: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 24px;
    }

    .config-item {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .config-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .config-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .config-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border-secondary);
      outline: none;
    }

    .config-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    .config-val {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      min-width: 38px;
      text-align: right;
    }

    .ring-wrap {
      display: flex;
      justify-content: center;
      margin: 4px 0 20px;
    }

    .ring-container {
      position: relative;
      width: 210px;
      height: 210px;
    }

    .ring-container svg { position: absolute; inset: 0; }

    .center-info {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .phase-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .time-display {
      font-size: 58px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }

    .round-info {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .btn-main {
      padding: 13px 40px;
      font-size: 16px;
      font-weight: 500;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-secondary);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-main.active {
      background: var(--text);
      color: var(--bg);
    }

    .btn-reset {
      padding: 13px 22px;
      font-size: 16px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 100%;
      background: var(--text);
      transition: width 0.1s linear;
      border-radius: 4px;
    }

    .session-info {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<h1>Interval Timer</h1>

<div class="config-grid">
  <div class="config-item">
    <div class="config-label">Travail</div>
    <div class="config-row">
      <input type="range" id="work-range" min="5" max="120" step="5" value="45">
      <span class="config-val" id="work-val">45s</span>
    </div>
  </div>
  <div class="config-item">
    <div class="config-label">Pause</div>
    <div class="config-row">
      <input type="range" id="rest-range" min="5" max="60" step="5" value="15">
      <span class="config-val" id="rest-val">15s</span>
    </div>
  </div>
  <div class="config-item">
    <div class="config-label">Rounds</div>
    <div class="config-row">
      <input type="range" id="rounds-range" min="1" max="20" step="1" value="8">
      <span class="config-val" id="rounds-val">8</span>
    </div>
  </div>
  <div class="config-item">
    <div class="config-label">Départ dans</div>
    <div class="config-row">
      <input type="range" id="prep-range" min="0" max="15" step="1" value="5">
      <span class="config-val" id="prep-val">5s</span>
    </div>
  </div>
</div>

<div class="ring-wrap">
  <div class="ring-container">
    <svg width="210" height="210" viewBox="0 0 210 210">
      <circle cx="105" cy="105" r="92" fill="none" stroke-width="10" stroke="rgba(128,128,128,0.15)" />
      <circle id="ring-fg" cx="105" cy="105" r="92" fill="none" stroke-width="10"
        stroke="#1a1a1a"
        stroke-linecap="round"
        stroke-dasharray="578"
        stroke-dashoffset="0"
        transform="rotate(-90 105 105)" />
    </svg>
    <div class="center-info">
      <div class="phase-label" id="phase-label">PRÊT</div>
      <div class="time-display" id="time-display">05</div>
      <div class="round-info" id="round-info">Round — / —</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-main" id="btn-start" onclick="toggleTimer()">Démarrer</button>
  <button class="btn-reset" onclick="resetTimer()">Reset</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>
<div class="session-info">
  <span id="session-elapsed">0:00 écoulé</span>
  <span id="session-total">0:00 total</span>
</div>

<script>
  const CIRC = 2 * Math.PI * 92;
  let cfg = { work: 45, rest: 15, rounds: 8, prep: 5 };
  let state = { running: false, phase: 'idle', round: 0, seconds: 0, interval: null };
  let totalElapsed = 0;

  function isDark() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function ringColor(phase) {
    if (phase === 'work') return isDark() ? '#f0f0ee' : '#1a1a1a';
    if (phase === 'rest') return isDark() ? '#8e8e93' : '#777770';
    return isDark() ? '#8e8e93' : '#aaaaaa';
  }

  function setupSlider(id, key, suffix) {
    const r = document.getElementById(id + '-range');
    const v = document.getElementById(id + '-val');
    r.addEventListener('input', () => {
      if (state.running) return;
      cfg[key] = +r.value;
      v.textContent = suffix ? r.value + suffix : r.value;
      updateSessionTotal();
      resetTimer();
    });
    v.textContent = suffix ? r.value + suffix : r.value;
  }

  setupSlider('work', 'work', 's');
  setupSlider('rest', 'rest', 's');
  setupSlider('rounds', 'rounds', '');
  setupSlider('prep', 'prep', 's');

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function fmtTime(s) {
    s = Math.floor(s);
    if (s >= 60) return Math.floor(s / 60) + ':' + pad(s % 60);
    return pad(s);
  }

  function updateSessionTotal() {
    const total = cfg.prep + cfg.rounds * (cfg.work + cfg.rest) - cfg.rest;
    document.getElementById('session-total').textContent = fmtTime(total) + ' total';
  }

  function setRingProgress(ratio, phase) {
    const offset = CIRC * (1 - Math.max(0, Math.min(1, ratio)));
    const fg = document.getElementById('ring-fg');
    fg.style.strokeDashoffset = offset;
    fg.style.stroke = ringColor(phase);
  }

  function setDisplay(label, time, round) {
    document.getElementById('phase-label').textContent = label;
    document.getElementById('time-display').textContent = fmtTime(time);
    document.getElementById('round-info').textContent = round;
  }

  function updateProgressBar(elapsed) {
    const total = cfg.prep + cfg.rounds * (cfg.work + cfg.rest) - cfg.rest;
    document.getElementById('progress-bar').style.width = Math.min(100, (elapsed / total) * 100) + '%';
    document.getElementById('session-elapsed').textContent = fmtTime(elapsed) + ' écoulé';
  }

  function beep(freq, dur) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function startPhase(phase, round) {
    state.phase = phase; state.round = round;
    if (phase === 'work') {
      state.seconds = cfg.work;
      setRingProgress(1, 'work');
      setDisplay('TRAVAIL', cfg.work, 'Round ' + round + ' / ' + cfg.rounds);
    } else {
      state.seconds = cfg.rest;
      setRingProgress(1, 'rest');
      setDisplay('PAUSE', cfg.rest, 'Round ' + round + ' / ' + cfg.rounds);
    }
  }

  function finishSession() {
    clearInterval(state.interval);
    state.running = false; state.phase = 'done';
    beep(880, 0.3); setTimeout(() => beep(1100, 0.3), 350);
    setRingProgress(1, 'work');
    document.getElementById('phase-label').textContent = 'TERMINÉ';
    document.getElementById('time-display').textContent = '00';
    document.getElementById('round-info').textContent = cfg.rounds + ' / ' + cfg.rounds + ' rounds';
    document.getElementById('btn-start').textContent = 'Recommencer';
    document.getElementById('btn-start').classList.remove('active');
  }

  function tick() {
    state.seconds--; totalElapsed++;
    updateProgressBar(totalElapsed);

    if (state.phase === 'prep') {
      if (state.seconds <= 0) { beep(880, 0.15); startPhase('work', 1); }
      else { setRingProgress(state.seconds / cfg.prep, 'prep'); setDisplay('PRÊT', state.seconds, 'Round — / ' + cfg.rounds); }
    } else if (state.phase === 'work') {
      if (state.seconds <= 0) {
        if (state.round >= cfg.rounds) finishSession();
        else { beep(440, 0.2); startPhase('rest', state.round); }
      } else { setRingProgress(state.seconds / cfg.work, 'work'); setDisplay('TRAVAIL', state.seconds, 'Round ' + state.round + ' / ' + cfg.rounds); }
    } else if (state.phase === 'rest') {
      if (state.seconds <= 0) { beep(660, 0.15); startPhase('work', state.round + 1); }
      else { setRingProgress(state.seconds / cfg.rest, 'rest'); setDisplay('PAUSE', state.seconds, 'Round ' + state.round + ' / ' + cfg.rounds); }
    }
  }

  function toggleTimer() {
    if (state.phase === 'done') { resetTimer(); return; }
    if (!state.running) {
      state.running = true;
      document.getElementById('btn-start').textContent = 'Pause';
      document.getElementById('btn-start').classList.add('active');
      if (state.phase === 'idle') {
        totalElapsed = 0; updateProgressBar(0);
        if (cfg.prep > 0) {
          state.phase = 'prep'; state.seconds = cfg.prep;
          setRingProgress(1, 'prep'); setDisplay('PRÊT', cfg.prep, 'Round — / ' + cfg.rounds);
        } else { startPhase('work', 1); }
      }
      state.interval = setInterval(tick, 1000);
    } else {
      state.running = false; clearInterval(state.interval);
      document.getElementById('btn-start').textContent = 'Reprendre';
      document.getElementById('btn-start').classList.remove('active');
    }
  }

  function resetTimer() {
    clearInterval(state.interval);
    state.running = false; state.phase = 'idle'; state.round = 0; state.seconds = 0; totalElapsed = 0;
    updateProgressBar(0); setRingProgress(1, 'idle');
    setDisplay('PRÊT', cfg.prep > 0 ? cfg.prep : cfg.work, 'Round — / ' + cfg.rounds);
    document.getElementById('btn-start').textContent = 'Démarrer';
    document.getElementById('btn-start').classList.remove('active');
  }

  updateSessionTotal();
  setDisplay('PRÊT', cfg.prep, 'Round — / ' + cfg.rounds);
  setRingProgress(1, 'idle');
</script>
</body>
</html>
